---
version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    open-pull-requests-limit: 10
    assignees:
      - "HiDiHo01"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "black*"
          - "pre-commit*"
          - "coverage*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    open-pull-requests-limit: 5
    groups:
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "pytest*"
          - "ruff"
          - "black*"
          - "pre-commit*"
          - "coverage*"
    
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "black*"
          - "pre-commit*"
          - "coverage*"
    reviewers:
      - "HiDiHo01"
      - "Veldkornet"
    assignees:
      - "HiDiHo01"
      - "Veldkornet"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
