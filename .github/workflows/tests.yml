name: Run Tests

permissions:
  contents: read
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    env:
      PYTEST_DISABLE_SOCKET: true

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # @v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            pypi.org:443
            files.pythonhosted.org:443
            sonarcloud.io:443
            objects.githubusercontent.com:443
            uploads.github.com:443
            upload.pypi.org:443
            test.pypi.org:443
            codecov.io:443
            uploader.codecov.io:443
            api.codecov.io:443
            cli.codecov.io:443
            storage.googleapis.com:443
            github-releases.githubusercontent.com:443
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # @v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # @v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry (if you use poetry)
        run: pip install poetry

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          pip install aresponses pytest pytest-asyncio pytest-homeassistant-custom-component
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Uninstall pytest-socket
        run: pip uninstall -y pytest-socket || true

      - name: Run pytest with coverage
        run: |
          PYTHONPATH=. pytest \
            --asyncio-mode=auto \
            --disable-warnings \
            --maxfail=1 \
            --cov=frank_energie \
            --cov-report=xml \
            tests/

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # @v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
