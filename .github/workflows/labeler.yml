name: PR Labeler

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # @v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            docs.github.com:443
            api.github.com:443
            github.com:443
            pypi.org:443
            files.pythonhosted.org:443
            sonarcloud.io:443
            objects.githubusercontent.com:443
            uploads.github.com:443
            upload.pypi.org:443
            test.pypi.org:443
            codecov.io:443
            uploader.codecov.io:443
            api.codecov.io:443
            cli.codecov.io:443
            storage.googleapis.com:443
            github-releases.githubusercontent.com:443
      - name: Apply labels
        uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # @v6

      - name: Size label
        uses: codelytv/pr-size-labeler@095a41fca88b8764fd9e008ad269bcdb82bb38b9 # @095a41fca88b8764fd9e008ad269bcdb82bb38b9
        with:
          xs_label: size/xs
          xs_max_size: 10
          s_label: size/s
          s_max_size: 50
          m_label: size/m
          m_max_size: 200
          l_label: size/l
          l_max_size: 500
          xl_label: size/xl
