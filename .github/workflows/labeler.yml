name: PR Labeler

on:
  pull_request_target:
    types:
    - opened
    - synchronize
    - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@17d0e2bd7d51742c71671bd19fa12bdc9d40a3d6 # @v2.8.1
      with:
        egress-policy: block
        allowed-endpoints: "api.github.com:443\ngithub.com:443\npypi.org:443\nfiles.pythonhosted.org:443\n\
          sonarcloud.io:443\nobjects.githubusercontent.com:443\n"
    - name: Apply labels
      uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # @v6

    - name: Size label
      uses: codelytv/pr-size-labeler@095a41fca88b8764fd9e008ad269bcdb82bb38b9 # @095a41fca88b8764fd9e008ad269bcdb82bb38b9
      with:
        xs_label: size/xs
        xs_max_size: 10
        s_label: size/s
        s_max_size: 50
        m_label: size/m
        m_max_size: 200
        l_label: size/l
        l_max_size: 500
        xl_label: size/xl
