name: PR Labeler

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    runs-on: ubuntu-latest

    steps:
      - name: Apply labels
        uses: actions/labeler@v5

      - name: Size label
        uses: codelytv/pr-size-labeler@v1
        with:
          xs_label: size/xs
          xs_max_size: 10
          s_label: size/s
          s_max_size: 50
          m_label: size/m
          m_max_size: 200
          l_label: size/l
          l_max_size: 500
          xl_label: size/xl