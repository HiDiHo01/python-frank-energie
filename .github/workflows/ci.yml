name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.5.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_test.txt

      - name: Lint (ruff)
        run: |
          ruff check .

      - name: Type check (mypy)
        run: |
          mypy custom_components

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=custom_components \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@507d9e6f7a5c7f6d2f2a3f0c8f3c0f2b9f1d2c3a # v4.3.0
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
